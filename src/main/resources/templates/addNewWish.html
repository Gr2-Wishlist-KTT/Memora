<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tilføj ønske</title>
    <link rel="stylesheet" th:href="@{/stylesheet.css}">
</head>

<body>

<header class="page-header">
    <div>
        <h1>Tilføj ønske</h1>
        <p class="page-header-subtitle">
            Opret et nyt ønske til din liste
        </p>
    </div>

    <a th:href="@{/memora/{wishlistID}(wishlistID=${wishlistID})}"
       class="btn-primary">
        ← Tilbage
    </a>
</header>

<main class="wishlist-container">

    <div class="card form-card">

        <form th:action="@{/memora/{wishlistID}/saveWish(wishlistID=${wishlistID})}"
              th:object="${wish}"
              method="post"
              class="form">

            <h3 style="margin: 0 0 12px 0;">Nyt ønske</h3>

            <input type="text"
                   placeholder="Navn på ønsket"
                   th:field="*{productName}"
                   required>

            <textarea rows="4"
                      placeholder="Beskrivelse (valgfrit)"
                      th:field="*{description}">
            </textarea>

            <input type="text"
                   placeholder="Link til produkt (valgfrit)"
                   th:field="*{linkToProduct}">

            <div class="form-actions">
                <button type="submit" class="btn-primary">
                    Gem ønske
                </button>
            </div>

        </form>

    </div>

</main>

</body>
</html>
