<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<!--@thymesvar id="user" type="com.example.memora.model.User"-->
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>Login Memora</h1>

<form th:action="@{/auth/login}" method="post">

    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" required><br><br>

    <label for="password">Adgangskode:</label><br>
    <input type="password" id="password" name="password" required><br><br>

    <button type="submit">Login</button>

</form>
<br>
<a th:href="@{/auth/register}">
    <button type="button">Opret ny bruger</button>
</a>

<a th:href="@{/auth/forgot-password}">
    <button type="button">Glemt adgangskode</button>
</a>

<a th:href="@{/}">
    <button type="button">Cancel</button>
</a>
<!-- Fejlbesked -->
<p th:if="${wrongCredentials}" style="color:red;">
    Forkert email eller adgangskode
</p>

</body>
</html>
