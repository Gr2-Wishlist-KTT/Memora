<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<!--@thymesvar id="user" type="com.example.memora.model.User"-->
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" th:href="@{/login/login.css}">
</head>

<body>

<div class="login-container">

    <h1>Login</h1>

    <form th:action="@{/auth/login}" method="post">

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="password">Adgangskode</label>
        <input type="password" id="password" name="password" required>

        <button type="submit">Login

        </button>

    </form>

    <!-- Fejlbesked -->
    <p th:if="${wrongCredentials}" class="error">
        Forkert email eller adgangskode
    </p>

    <!-- Knapper / links -->
    <a th:href="@{/auth/register}" class="secondary-btn full-width">
        Opret ny bruger
    </a>

    <a th:href="@{/auth/forgot-password}" class="link-btn">
        Glemt adgangskode?
    </a>

    <a th:href="@{/}" class="link-btn">
        Cancel
    </a>

</div>

</body>
</html>
