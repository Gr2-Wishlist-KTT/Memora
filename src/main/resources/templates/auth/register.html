<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<!--@thymesvar id="user" type="com.example.memora.model.User"-->
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>Register User</h1>


<form th:action="@{/auth/register}" th:object="${user}" method="post">

    <label for="username">Brugernavn:</label><br>
    <input type="text"
           id="username"
           th:field="*{username}"
           required><br><br>

    <label for="password">Adgangskode:</label><br>
    <input type="password" id="password" th:field="*{password}" required><br><br>

    <label for="email">Email:</label><br>
    <input type="email" id="email" th:field="*{email}" required><br><br>


    <button type="submit">Opret bruger</button>



</form>
<br>

<a th:href="@{/auth/login}">
    <button type="button">Cancel</button>
</a>
</body>
</html>
