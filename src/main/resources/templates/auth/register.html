<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Opret bruger</title>
</head>

        <link rel="stylesheet" th:href="@{/login/login.css}">
</head>
<body>

<div class="login-container">

    <h1>Opret bruger</h1>

    <form th:action="@{/auth/register}" th:object="${user}" method="post">

        <label for="username">Brugernavn</label>
        <input type="text"
               id="username"
               th:field="*{username}"
               required>

        <label for="password">Adgangskode</label>
        <input type="password"
               id="password"
               th:field="*{password}"
               required>

        <label for="email">Email</label>
        <input type="email"
               id="email"
               th:field="*{email}"
               required>

        <button type="submit">Opret bruger</button>

    </form>

    <!-- Navigation -->
    <a th:href="@{/auth/login}" class="secondary-btn full-width">
        Tilbage til login
    </a>

</div>

</body>
</html>
