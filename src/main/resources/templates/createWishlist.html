<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Wishlist</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<h1>Create Wishlist</h1>

<div class="liste">

    <div class="papir">

        <form th:action="@{/wishlist}" th:object="${wishlist}" method="post">

            <label>Title</label><br><br>

            <input type="text"
                   th:field="*{title}"
                   placeholder="Enter wishlist title"
                   required />

            <br><br>

            <button type="submit" class="tilfoej-knap">
                Create Wishlist
            </button>

        </form>

    </div>

</div>

<a th:href="@{/wishlist}" class="plus-knap">
    ←
</a>

</body>
</html>
