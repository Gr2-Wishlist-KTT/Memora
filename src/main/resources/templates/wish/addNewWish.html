<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <title>Tilføj ønskeliste</title>

    <link rel="stylesheet" th:href="@{/navbar.css}">
    <link rel="stylesheet" th:href="@{/stylesheet.css}">
</head>

<body>

<div th:replace="fragments/nav :: navbar"></div>

<div class="page-container">

    <div class="form-box">
        <h1>Tilføj ønske</h1>

        <form th:action="@{/wishlists/{wishlistID}/wishes(wishlistID=${wishlistID})}" th:object="${wish}" method="post">

            <label for="productName">Produkt</label>
            <input id="productName" type="text" th:field="*{productName}" required placeholder="Hvad ønsker du dig?...">

            <label for="description">Beskrivelse</label>
            <input id="description" type="text" th:field="*{description}" required placeholder="Beskrivelse...">

            <label for="linkToProduct">Link</label>
            <input id="linkToProduct" type="text" th:field="*{linkToProduct}" required placeholder="Tilføj link til produktet...">

            <button type="submit" class="submit-btn">Tilføj ønske</button>
        </form>

        <a th:href="@{/wishlists}" class="back-link">← Tilbage</a>
    </div>

</div>

</body>
</html>
