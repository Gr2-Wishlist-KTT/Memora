<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <title>Rediger ønske</title>

    <link rel="stylesheet" th:href="@{/navbar.css}">
    <link rel="stylesheet" th:href="@{/stylesheet.css}">
</head>

<body>

<!-- Navbar -->
<div th:replace="fragments/nav :: navbar"></div>

<div class="page-container">

    <div class="form-box">
        <h1>Rediger ønske</h1>

        <form th:action="@{/wishlists/{id}(id=${wish.id})}"
              th:object="${wish}" method="post" class="wishlist-form">

            <label for="productName">Product</label>
            <input id="productName" type="text" th:field="*{productName}" required>

            <label for="description">Beskrivelse</label>
            <input id="description" type="text" th:field="*{description}" required>

            <label for="linkToProduct">Link</label>
            <input id="linkToProduct" type="text" th:field="*{linkToProduct}" required>

            <button type="submit" class="submit-btn">Opdater ønskeliste</button>
        </form>

        <a th:href="@{/wishlists}" class="back-link">← Tilbage</a>
    </div>

</div>

</body>
</html>
