<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <title>Ønske</title>

    <link rel="stylesheet" th:href="@{/navbar.css}">
    <link rel="stylesheet" th:href="@{/stylesheet.css}">
</head>

<body>

<div th:replace="fragments/nav :: navbar"></div>

<div class="page-container">

    <div class="page-container">

        <div class="wishlist-card wish-detail">

            <h1 th:text="${wish.productName}"></h1>

            <p class="wish-description" th:text="${wish.description}"></p>

            <a class="wish-link"
               th:href="${wish.linkToProduct}"
               target="_blank">
                Se produkt →
            </a>

        </div>

        <!-- 👇 MOVED OUTSIDE -->
        <a th:href="@{/wishlists/{wishlistId}(wishlistId=${wishlistId})}"
           class="back-link back-under">
            ← Tilbage
        </a>

    </div>

</div>

</body>
</html>
