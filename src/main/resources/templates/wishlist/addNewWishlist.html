<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
  <meta charset="UTF-8">
  <title>Tilføj ønskeliste</title>

  <link rel="stylesheet" th:href="@{/navbar.css}">
  <link rel="stylesheet" th:href="@{/stylesheet.css}">
</head>

<body>

<div th:replace="fragments/nav :: navbar"></div>

<div class="page-container">

  <div class="form-box">
    <h1>Tilføj ønskeliste</h1>

    <form th:action="@{/wishlists}" th:object="${wishlist}" method="post" class="wishlist-form">

      <label for="title">Titel</label>
      <input id="title" type="text" th:field="*{title}" required placeholder="Navn på ønskelisten...">

      <button type="submit" class="submit-btn">Opret ønskeliste</button>
    </form>

    <a th:href="@{/wishlists}" class="back-link">← Tilbage</a>
  </div>

</div>

</body>
</html>
