<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <title>Rediger ønskeliste</title>

    <link rel="stylesheet" th:href="@{/navbar.css}">
    <link rel="stylesheet" th:href="@{/stylesheet.css}">
</head>

<body>

<!-- Navbar -->
<div th:replace="fragments/nav :: navbar"></div>

<div class="page-container">

    <div class="form-box">
        <h1>Rediger ønskeliste</h1>

        <form th:action="@{/wishlists/{id}(id=${wishlist.id})}"
              th:object="${wishlist}" method="post" class="wishlist-form">

            <label for="title">Titel</label>
            <input id="title" type="text" th:field="*{title}" required>

            <button type="submit" class="submit-btn">Opdater ønskeliste</button>
        </form>

        <a th:href="@{/wishlists}" class="back-link">← Tilbage</a>
    </div>

</div>

</body>
</html>
