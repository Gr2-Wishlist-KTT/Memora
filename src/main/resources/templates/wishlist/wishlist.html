<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Ønskeliste</title>
    <link rel="stylesheet" th:href="@{/navbar.css}">
    <link rel="stylesheet" th:href="@{/stylesheet.css}"></head>
<body>


<div th:replace="fragments/nav :: navbar"></div>

<h1>Min ønskeliste</h1>

<div>
    <a class="action-btn edit-btn" th:href="@{/wishlists/{wishlistId}/share (wishlistId=${wishlist.id})}">Del ønskeliste</a>
</div>

    <!-- Dine eksisterende ønskelister -->
    <div class="wishlist-card" th:each="wish : ${wishes}">
        <a class="wishlist-title" th:href="@{/wishlists/{id}(id=${wishlist.id})}">
            <h3 th:text="${wish.productName}"></h3>
        </a>

        <div class="wishlist-actions">
            <a class="action-btn edit-btn"
               th:href="@{/wishlists/{wishlistId}/wishes/{wishId}/edit(wishlistId=${wishlist.id}, wishId=${wish.id})}">
                Rediger
            </a>


            <form th:action="@{/wishlists/{wishlistId}/wishes/{wishId}/delete(wishlistId=${wishlist.id}, wishId=${wish.id})}"
                  method="post">
                <button type="submit" class="action-btn delete-btn">Slet</button>
            </form>

            </form>
        </div>
    </div>
</div>

<div th:if="${canEdit}">
<a th:href="@{/wishlists/{wishlistId}/wishes/new (wishlistId=${wishlist.id})}" class="plus-knap">+</a>
</div>
<div>
    <a th:href="@{/wishlists}" class="back-link">← Tilbage</a>
</div>
</body>
</html>
