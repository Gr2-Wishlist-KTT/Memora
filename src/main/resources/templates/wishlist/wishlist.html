<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ønskeliste</title>
    <link rel="stylesheet" th:href="@{/navbar.css}">
    <link rel="stylesheet" th:href="@{/stylesheet.css}">
</head>

<body>

<div th:replace="fragments/nav :: navbar"></div>

<div class="page-container">

    <!-- Header -->
    <div class="wishlist-header3">
        <h1>Min ønskeliste</h1>

    </div>

    <!-- Wishes grid -->
    <div class="wishlist-grid">

        <div class="wishlist-card" th:each="wish : ${wishes}">

            <a class="wishlist-title"
               th:href="@{/wishlists/{wishlistId}/wishes/{wishId}(wishlistId=${wishlist.id}, wishId=${wish.id})}">
                <h3 th:text="${wish.productName}"></h3>
            </a>

            <div class="wishlist-actions">
                <a class="action-btn edit-btn"
                   th:href="@{/wishlists/{wishlistId}/wishes/{wishId}/edit(wishlistId=${wishlist.id}, wishId=${wish.id})}">
                    Rediger
                </a>

                <form th:action="@{/wishlists/{wishlistId}/wishes/{wishId}/delete(wishlistId=${wishlist.id}, wishId=${wish.id})}"
                      method="post">
                    <button type="submit" class="action-btn delete-btn">Slet</button>
                </form>
            </div>

        </div>

    </div>

    <!-- Back button -->
    <a th:href="@{/wishlists}" class="back-link back-under">
        ← Tilbage
    </a>

</div>

<!-- Floating add button -->
<div th:if="${canEdit}">
    <a th:href="@{/wishlists/{wishlistId}/wishes/new (wishlistId=${wishlist.id})}"
       class="fab-button">
        +
    </a>
    <a th:href="@{/wishlists/{wishlistId}/share (wishlistId=${wishlist.id})}"
       class="fab-button fab-share">
        ⤴
    </a>
</div>

</body>
</html>
